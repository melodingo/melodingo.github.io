        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Function to update theme
                function updateTheme(theme) {
                    var d = document.documentElement;
                    var c = d.classList;

                    if (theme === 'light') {
                        c.remove('dark');
                        c.add('light');
                        d.style.colorScheme = 'light';
                        localStorage.setItem('theme', 'light');
                        console.log('Switched to light mode');
                    } else if (theme === 'dark') {
                        c.remove('light');
                        c.add('dark');
                        d.style.colorScheme = 'dark';
                        localStorage.setItem('theme', 'dark');
                        console.log('Switched to dark mode');
                    }
                }

                // Initial theme setup
                (function() {
                    var storedTheme = localStorage.getItem('theme');
                    if (storedTheme) {
                        updateTheme(storedTheme);
                    } else {
                        // Default to dark if no theme is set
                        updateTheme('dark');
                    }
                })();

                // Event listener for the button
                document.getElementById('themeToggleBtn').addEventListener('click', function() {
                    var currentTheme = localStorage.getItem('theme');
                    if (currentTheme === 'light') {
                        updateTheme('dark');
                    } else {
                        updateTheme('light');
                    }
                });
            });

            document.addEventListener('DOMContentLoaded', function() {
                const typingElement = document.getElementById('contact-method');
                if (!typingElement) {
                    return;
                }

                // When the animation ends, add the finished class to stop blinking.
                typingElement.addEventListener('animationend', () => {
                    typingElement.classList.add('finished');
                });
            });
        </script>
        <style jsx="1" global="1">
            #nprogress {
                pointer-events: none;
            }

            #nprogress .bar {
                background: #14b8a6;
                position: fixed;
                z-index: 9999;
                top: 0;
                left: 0;
                width: 100%;
                height: 3px;
            }

            #nprogress .peg {
                display: block;
                position: absolute;
                right: 0px;
                width: 100px;
                height: 100%;
                box-shadow: 0 0 10px #14b8a6, 0 0 5px #14b8a6;
                opacity: 1;
                -webkit-transform: rotate(3deg) translate(0px, -4px);
                -ms-transform: rotate(3deg) translate(0px, -4px);
                transform: rotate(3deg) translate(0px, -4px);
            }

            #nprogress .spinner {
                display: block;
                position: fixed;
                z-index: 1031;
                top: 15px;
                right: 15px;
            }

            #nprogress .spinner-icon {
                width: 18px;
                height: 18px;
                box-sizing: border-box;
                border: solid 2px transparent;
                border-top-color: #14b8a6;
                border-left-color: #14b8a6;
                border-radius: 50%;
                -webkit-animation: nprogresss-spinner 400ms linear infinite;
                animation: nprogress-spinner 400ms linear infinite;
            }

            .nprogress-custom-parent {
                overflow: hidden;
                position: relative;
            }

            .nprogress-custom-parent #nprogress .spinner, .nprogress-custom-parent #nprogress .bar {
                position: absolute;
            }

            @-webkit-keyframes nprogress-spinner {
                0% {
                    -webkit-transform: rotate(0deg);
                }

                100% {
                    -webkit-transform: rotate(360deg);
                }
            }

            @keyframes nprogress-spinner {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }

            .contact-page .contact-terminal-container {
                width: min(92vw, 600px);
            }

            .contact-page .contact-nav-row {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
                align-items: center;
                width: 100%;
            }

            .contact-page .contact-nav-center {
                min-width: 0;
            }

            .contact-page .contact-nav-right {
                display: flex;
                justify-content: flex-end;
                min-width: 0;
            }

            @media (max-width: 767px) {
                .contact-page .contact-nav-row {
                    grid-template-columns: auto 1fr auto;
                    column-gap: 0.5rem;
                }

                .contact-page .contact-nav-center {
                    overflow: hidden;
                }

                .contact-page .contact-nav-center p {
                    max-width: 100%;
                }

                .contact-page main {
                    padding: 5.5rem 1rem 1rem;
                    align-items: flex-start;
                }

                .contact-page .contact-terminal-container {
                    width: 100%;
                    max-width: 100%;
                }

                .contact-page .terminal-button-container {
                    flex-direction: column;
                    align-items: center;
                    gap: 0.75rem;
                    padding: 0.75rem 0;
                }

                .contact-page .typing-animation {
                    white-space: normal;
                    width: 100%;
                    animation: none;
                    border-right: none;
                }
            }
        </style>
